name: CI

on:
  push:
    branches: [main, 'copilot/**']
    paths:
      - 'apps/player-pwa/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/player-pwa/**'

defaults:
  run:
    working-directory: apps/player-pwa

jobs:
  lint-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/player-pwa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/player-pwa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build (Standalone)
    runs-on: ubuntu-latest
    needs: [lint-type-check, test]
    env:
      NEXT_PUBLIC_API_URL: https://api.koralink.sa
      NEXT_PUBLIC_MAPBOX_TOKEN: pk.placeholder
      NEXT_PUBLIC_MOYASAR_KEY: pk.placeholder
      NEXT_PUBLIC_APP_URL: https://app.koralink.sa
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/player-pwa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
